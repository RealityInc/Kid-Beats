<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bleep Bloop 🚀</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800;900&family=Orbitron:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{font-family:'Baloo 2',cursive;background:#04050f;color:#e8f4ff;min-height:100vh;overflow-x:hidden;touch-action:manipulation}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(1px 1px at 5% 10%,rgba(255,255,255,.9) 0%,transparent 100%),radial-gradient(1px 1px at 15% 40%,rgba(255,255,255,.5) 0%,transparent 100%),radial-gradient(2px 2px at 25% 8%,rgba(0,210,255,.9) 0%,transparent 100%),radial-gradient(1px 1px at 35% 70%,rgba(255,255,255,.6) 0%,transparent 100%),radial-gradient(1px 1px at 45% 22%,rgba(255,60,172,.9) 0%,transparent 100%),radial-gradient(2px 2px at 58% 55%,rgba(0,255,202,.8) 0%,transparent 100%),radial-gradient(1px 1px at 75% 15%,rgba(249,255,61,.8) 0%,transparent 100%),radial-gradient(2px 2px at 85% 48%,rgba(0,210,255,.7) 0%,transparent 100%),radial-gradient(1px 1px at 92% 88%,rgba(255,255,255,.6) 0%,transparent 100%)}
.gbg{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(0,210,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,210,255,.02) 1px,transparent 1px);background-size:56px 56px;animation:gs 20s linear infinite}
@keyframes gs{to{background-position:56px 56px}}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px 40px}
.logo{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(2.2rem,8vw,3.8rem);background:linear-gradient(135deg,#00d2ff,#00ffca,#ff3dac);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:4px;filter:drop-shadow(0 0 24px rgba(0,210,255,.4));text-align:center}
.tagline{font-size:clamp(.8rem,2.5vw,1rem);font-weight:700;color:#3a5070;letter-spacing:3px;text-transform:uppercase;margin-top:4px;text-align:center;margin-bottom:24px}
.nova-intro{margin:0 auto 28px;max-width:360px;background:rgba(0,255,202,.06);border:1px solid rgba(0,255,202,.15);border-radius:20px;padding:16px 20px;text-align:center;width:100%}
.nova-face{font-size:2.8rem;margin-bottom:6px;display:block;animation:nf 2s ease-in-out infinite alternate}
@keyframes nf{from{transform:scale(1) rotate(-3deg)}to{transform:scale(1.1) rotate(3deg)}}
.nova-say{font-size:clamp(.9rem,3vw,1.05rem);font-weight:700;color:#00ffca;line-height:1.5}
.nova-say b{color:#e8f4ff}
.modes{display:flex;flex-direction:column;gap:14px;width:100%;max-width:420px}
.mode-card{border-radius:24px;padding:20px 22px;cursor:pointer;display:flex;align-items:center;gap:18px;border:2px solid transparent;transition:transform .15s,box-shadow .15s;-webkit-appearance:none;text-align:left;position:relative;overflow:hidden;background:transparent}
.mode-card:active{transform:scale(.96)!important}
.mode-explorer{background:linear-gradient(135deg,#1c0d00,#120800);border-color:rgba(255,165,0,.45)}
.mode-explorer:hover{box-shadow:0 0 32px rgba(255,165,0,.3);transform:translateY(-2px)}
.mode-maker{background:linear-gradient(135deg,#001a30,#000d1a);border-color:rgba(0,210,255,.45)}
.mode-maker:hover{box-shadow:0 0 32px rgba(0,210,255,.3);transform:translateY(-2px)}
.mode-producer{background:linear-gradient(135deg,#1a0020,#0d0015);border-color:rgba(255,61,172,.45)}
.mode-producer:hover{box-shadow:0 0 32px rgba(255,61,172,.3);transform:translateY(-2px)}
.mode-ico{font-size:2.8rem;flex-shrink:0}
.mode-name{font-family:'Orbitron',monospace;font-weight:900;font-size:clamp(1rem,4vw,1.25rem);letter-spacing:2px;margin-bottom:2px}
.mode-explorer .mode-name{color:#ffa500}
.mode-maker   .mode-name{color:#00d2ff}
.mode-producer .mode-name{color:#ff3dac}
.mode-age{font-family:'Orbitron',monospace;font-size:.55rem;letter-spacing:2px;color:#3a5070;text-transform:uppercase;margin-bottom:5px}
.mode-desc{font-size:.84rem;font-weight:700;color:#8899aa;line-height:1.4}
.lang-row{display:flex;gap:10px;margin-top:22px}
.lang-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:7px 16px;font-family:'Orbitron',monospace;font-size:.55rem;color:#3a5070;cursor:pointer;letter-spacing:1px;-webkit-appearance:none;transition:all .15s}
.lang-btn.on{background:rgba(0,210,255,.1);border-color:#00d2ff;color:#00d2ff}
.footer{margin-top:18px;font-family:'Orbitron',monospace;font-size:.48rem;letter-spacing:2px;color:#1a2535;text-align:center}
</style>
</head>
<body>
<div class="stars"></div>
<div class="gbg"></div>
<div class="wrap">
  <div class="logo">BLEEP BLOOP</div>
  <div class="tagline">Space Music Studio 🚀</div>
  <div class="nova-intro">
    <span class="nova-face">🤖</span>
    <div class="nova-say" id="novaGreet">Hi! I'm <b>NOVA</b>, your music buddy.<br>Who's making music today?</div>
  </div>
  <div class="modes">
    <button class="mode-card mode-explorer" onclick="go('explorer')">
      <span class="mode-ico">🌟</span>
      <div>
        <div class="mode-name">EXPLORER</div>
        <div class="mode-age" id="age-e">Ages 4--6</div>
        <div class="mode-desc" id="desc-e">Tap big sounds and let NOVA make magic!</div>
      </div>
    </button>
    <button class="mode-card mode-maker" onclick="go('maker')">
      <span class="mode-ico">🎵</span>
      <div>
        <div class="mode-name">MAKER</div>
        <div class="mode-age" id="age-m">Ages 7--9</div>
        <div class="mode-desc" id="desc-m">Build beats, record your voice, make songs!</div>
      </div>
    </button>
    <button class="mode-card mode-producer" onclick="go('producer')">
      <span class="mode-ico">🎛️</span>
      <div>
        <div class="mode-name">PRODUCER</div>
        <div class="mode-age" id="age-p">Ages 10--12</div>
        <div class="mode-desc" id="desc-p">Full studio: mix, compose, and master your tracks.</div>
      </div>
    </button>
  </div>
  <div class="lang-row">
    <button class="lang-btn on" id="lEN" onclick="setLang('en')">🇺🇸 ENGLISH</button>
    <button class="lang-btn"    id="lES" onclick="setLang('es')">🇲🇽 ESPAÑOL</button>
  </div>
  <div class="footer">BLEEP BLOOP v3 · Space Music Studio</div>
</div>
<script>
var lang = localStorage.getItem('bb_lang') || 'en';
var T = {
  en: {
    greet: "Hi! I'm <b>NOVA</b>, your music buddy.<br>Who's making music today?",
    age_e:'Ages 4--6', desc_e:'Tap big sounds and let NOVA make magic!',
    age_m:'Ages 7--9', desc_m:'Build beats, record your voice, make songs!',
    age_p:'Ages 10--12', desc_p:'Full studio: mix, compose, and master your tracks.'
  },
  es: {
    greet: "¡Hola! Soy <b>NOVA</b>, tu amigo musical.<br>¿Quién hace música hoy?",
    age_e:'Edades 4--6', desc_e:'¡Toca sonidos grandes y deja que NOVA haga magia!',
    age_m:'Edades 7--9', desc_m:'¡Crea ritmos, graba tu voz y haz canciones!',
    age_p:'Edades 10--12', desc_p:'Estudio completo: mezcla, compone y masteriza.'
  }
};
function setLang(l) {
  lang = l; localStorage.setItem('bb_lang', l);
  var t = T[l];
  document.getElementById('novaGreet').innerHTML = t.greet;
  document.getElementById('age-e').textContent  = t.age_e;
  document.getElementById('desc-e').textContent = t.desc_e;
  document.getElementById('age-m').textContent  = t.age_m;
  document.getElementById('desc-m').textContent = t.desc_m;
  document.getElementById('age-p').textContent  = t.age_p;
  document.getElementById('desc-p').textContent = t.desc_p;
  document.getElementById('lEN').classList.toggle('on', l === 'en');
  document.getElementById('lES').classList.toggle('on', l === 'es');
}
function go(mode) { localStorage.setItem('bb_mode', mode); window.location.href = mode + '.html'; }
setLang(lang);
</script>
</body>
</html>
